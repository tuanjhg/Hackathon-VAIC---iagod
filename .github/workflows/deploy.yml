name: Test, build and deploy to Compute Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: pip install -e './apps/api[dev]'
      - run: pytest -q
        working-directory: apps/api
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run type-check && npm run lint && npm test -- --run
        working-directory: apps/web

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
      IMAGE_PREFIX: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker "${AR_HOST}" --quiet
      - name: Build and push immutable images
        run: |
          docker build -f apps/api/Dockerfile.prod -t "${IMAGE_PREFIX}/api:${IMAGE_TAG}" .
          docker build --build-arg NEXT_PUBLIC_API_URL=/api/v1 -t "${IMAGE_PREFIX}/web:${IMAGE_TAG}" apps/web
          docker push "${IMAGE_PREFIX}/api:${IMAGE_TAG}"
          docker push "${IMAGE_PREFIX}/web:${IMAGE_TAG}"
      - name: Copy manifest through IAP
        run: |
          gcloud compute scp deploy/docker-compose.prod.yml scripts/gcp/remote-deploy.sh \
            "${{ vars.GCP_VM_NAME }}:~/" --project "${{ vars.GCP_PROJECT_ID }}" \
            --zone "${{ vars.GCP_ZONE }}" --tunnel-through-iap --quiet
      - name: Roll out and wait for health checks
        run: |
          gcloud compute ssh "${{ vars.GCP_VM_NAME }}" --project "${{ vars.GCP_PROJECT_ID }}" \
            --zone "${{ vars.GCP_ZONE }}" --tunnel-through-iap --quiet --command \
            "sudo bash ~/remote-deploy.sh '${{ vars.GCP_PROJECT_ID }}' '${{ vars.GCP_REGION }}' '${{ vars.GCP_AR_REPOSITORY }}' '${IMAGE_TAG}' '${{ vars.GCP_SECRET_NAME }}' 'https' '${{ vars.GCP_PUBLIC_HOST }}'"
