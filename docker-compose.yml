services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-needwise}
      POSTGRES_USER: ${POSTGRES_USER:-needwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-needwise}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://needwise:needwise@postgres:5432/needwise}
      POLICY_DATABASE_URL: ${POLICY_DATABASE_URL:-${DATABASE_URL:-postgresql+psycopg://needwise:needwise@postgres:5432/needwise}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PRODUCTS_DATA_PATH: /app/data/demo/products.json
      REALDATA_PROCESSED_PATH: /app/data/realdata/processed
      # Router A6 (apps/api/src/router) -- model chính qua API key OpenRouter
      # (ADR A2'', không self-host, không FPT AI Factory). Set LLM_API_KEY
      # thật trong .env; base_url có default OpenRouter sẵn vì đó luôn là
      # provider dùng, chỉ key là bí mật thật sự cần .env riêng.
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen/qwen3.6-27b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # "ai" = pipeline S1-S8 (cần LLM_API_KEY), "mock" = rule-based cũ.
      CHAT_PIPELINE: ${CHAT_PIPELINE:-ai}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    command: ["sh", "-c", "alembic upgrade head && python -m src.seed.sync_catalog_products && python -m src.rag.cli build --source /app/data/policy && uvicorn src.main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      API_URL: http://api:8000/api/v1
    expose:
      - "3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
