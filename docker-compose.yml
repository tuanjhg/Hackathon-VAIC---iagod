services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-needwise}
      POSTGRES_USER: ${POSTGRES_USER:-needwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-needwise}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://needwise:needwise@postgres:5432/needwise}
      POLICY_DATABASE_URL: ${POLICY_DATABASE_URL:-${DATABASE_URL:-postgresql+psycopg://needwise:needwise@postgres:5432/needwise}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    command: ["sh", "-c", "alembic upgrade head && python -m src.db.seed && python -m src.rag.cli build --source /app/data/policy && uvicorn src.main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      API_URL: http://api:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
